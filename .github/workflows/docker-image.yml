name: Docker Publish (Backend & Frontend)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # BACKEND
      - name: Backend metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/financecontrol-backend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & Push backend
        uses: docker/build-push-action@v6
        with:
          context: ./API/financeControl
          file: ./API/financeControl/Dockerfile
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # FRONTEND
      - name: Frontend metadata
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/financecontrol-frontend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/financeControl
          file: ./frontend/financeControl/Dockerfile
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
