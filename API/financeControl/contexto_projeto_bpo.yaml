# CONTEXTO DO PROJETO BPO FINANCEIRO - CONTAS A PAGAR
# Arquivo para inicialização de IA em novos chats
# Última atualização: 20/08/2025

projeto:
  nome: "Sistema de Controle de Contas a Pagar"
  finalidade: "Teste prático para vaga em empresa de BPO Financeiro"
  modelo_negocio: "B2B (Business-to-Business)"
  publico_alvo: "Exclusivamente Pessoa Jurídica (CNPJ)"

status_desenvolvimento:
  backend:
    estado: "em_desenvolvimento"
    tecnologia: "Docker"
    observacao: "Controllers essenciais incompletos para testes finais"
  frontend:
    estado: "nao_iniciado"
    tecnologia: "Angular em Docker"
    observacao: "Desenvolvimento previsto"

arquitetura:
  camadas:
    - comercial
    - operacional
  isolamento: "Multitenancy por Tenant"

entidades:
  Account:
    finalidade: "Cliente contratante (PJ que assina contrato com o BPO)"
    escopo: "Comercial/CRM - NÃO operacional"
    atributos:
      - id: "UUID"
      - razao_social: "string"
      - cnpj: "string (sem formatação)"
      - inscricao_estadual: "string|null"
      - nome_fantasia: "string|null"
      - plano_contratado: "enum (basic, premium, enterprise)"
      - data_inicio_contrato: "Date"
      - data_fim_contrato: "Date"
    observacao: "Pode conter um ou mais Tenants"

  Tenant:
    finalidade: "CNPJ específico com finanças gerenciadas - contêiner isolado de dados"
    escopo: "Núcleo operacional de contas a pagar"
    atributos:
      - id: "UUID (distinto do Account ID)"
      - account_id: "UUID (FK para Account)"
      - razao_social: "string"
      - cnpj: "string (sem formatação)"
      - configuracoes: "JSON"
      - status: "enum (active, suspended, canceled)"
    observacao: "Todo dado financeiro pertence a um e apenas um Tenant"

  User:
    finalidade: "Pessoa autenticável no sistema"
    tipos:
      - operador_bpo: "Funcionários do BPO"
      - gestor_cliente: "Funcionários do cliente"
    atributos:
      - id: "UUID"
      - nome: "string"
      - email: "string (unique para login)"
      - password_hash: "string"
      - is_bpo_staff: "boolean (TRUE para BPO, FALSE para cliente)"

  UserTenantRole:
    finalidade: "Definir permissões de User em Tenant específico - cerne do controle de acesso"
    atributos:
      - id: "UUID"
      - user_id: "UUID (FK para User)"
      - tenant_id: "UUID (FK para Tenant)"
      - role: "enum (admin, aprovador_financeiro, visualizador)"
    regras_acesso:
      - bpo_staff_true: "Pode ter acesso a múltiplos Tenants de múltiplas Accounts"
      - bpo_staff_false: "Só pode acessar Tenants da Account associada"

nucleo_operacional:
  observacao: "Todas as entidades abaixo possuem tenant_id: UUID para isolamento"
  entidades:
    Fornecedor:
      atributos:
        - id: "UUID"
        - nome_fantasia: "string"
        - razao_social: "string"
        - cnpj: "string|null"
        - cpf: "string|null"
        - email: "string|null"
        - telefone: "string|null"

    ObrigacaoFinanceira:
      atributos:
        - id: "UUID"
        - fornecedor_id: "UUID (FK para Fornecedor)"
        - descricao: "string"
        - numero_documento: "string|null"
        - valor_total: "decimal"
        - data_vencimento: "Date"
        - data_emissao: "Date"
        - categoria_id: "UUID (FK para Categoria)"
        - centro_custo_id: "UUID (FK para CentroCusto)"
        - status: "enum (pendente, em_aprovacao, aprovado, aguardando_pagamento, pago, cancelado, vencido)"

    FluxoAprovacao:
      finalidade: "Definir sequência de aprovações por valor/Tenant"

    RegistroAprovacao:
      finalidade: "Registro histórico de ações (approve, reject, comment) em ObrigacaoFinanceira"

    Anexo:
      atributos:
        - id: "UUID"
        - obrigacao_financeira_id: "UUID (FK para ObrigacaoFinanceira)"
        - nome_arquivo: "string"
        - tipo_mime: "string"
        - tamanho_bytes: "integer"
        - url_armazenamento: "string"

    AgendamentoPagamento:
      finalidade: "Parcela/agendamento específico de ObrigacaoFinanceira aprovada"
      atributos:
        - id: "UUID"
        - obrigacao_financeira_id: "UUID"
        - valor: "decimal"
        - data_prevista: "Date"
        - status: "enum (aguardando, agendado, pago, cancelado)"

    OrdemPagamento:
      finalidade: "Consolidar múltiplos AgendamentoPagamento para envio ao banco"
      atributos:
        - id: "UUID"
        - data_geracao: "Date"
        - valor_total: "decimal"
        - status: "enum (gerada, transmitida, processada, parcialmente_processada, falha)"

    TransacaoPagamento:
      finalidade: "Registro do efetivo pagamento no banco"
      atributos:
        - id: "UUID"
        - agendamento_pagamento_id: "UUID"
        - ordem_pagamento_id: "UUID"
        - data_pagamento: "Date"
        - valor_pago: "decimal"
        - codigo_retorno_banco: "string|null"

    entidades_suporte:
      - Categoria: "Classificação da despesa"
      - CentroCusto: "Departamento/projeto para rateio"

    LogEvento:
      finalidade: "Auditoria de todas as ações significativas"
      atributos:
        - id: "UUID"
        - user_id: "UUID"
        - tenant_id: "UUID"
        - entidade_afetada: "string"
        - id_entidade_afetada: "UUID"
        - acao: "string (CREATE, UPDATE, DELETE, STATUS_CHANGE)"
        - timestamp: "DateTime"
        - detalhes: "JSON|null"

instrucoes_ia:
  - "Esta descrição é a fonte única da verdade para o projeto"
  - "Baseie-se exclusivamente nestas especificações"
  - "Não assuma informações não presentes aqui"
  - "Solicite informações faltantes antes de prosseguir"
  - "Foco imediato: conclusão do backend"
