<div
  *ngIf="showModal"
  class="fixed left-0 top-0 h-screen inset-0 bg-black bg-opacity-80 z-50"
  (click)="onClose()"
>
  <dialog
    class="fixed left-1/2 -translate-x-1/2 -translate-y-1/2 top-1/2 max-w-[554px] w-full flex flex-col p-[40px] gap-[30px] rounded-[30px] bg-white"
    (click)="$event.stopPropagation()"
  >
    <div class="flex justify-between items-center">
      <h3 class="text-xl font-bold text-gray-900">{{ title }}</h3>
      <button type="button" (click)="onClose()" class="text-gray-500 hover:text-gray-700 text-2xl">
        &times;
      </button>
    </div>
    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Razão Social *</label>
        <input
          type="text"
          [(ngModel)]="tenant.razaoSocial"
          name="razaoSocial"
          required
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Razão Social da empresa"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nome Fantasia</label>
        <input
          type="text"
          [(ngModel)]="tenant.nomeFantasia"
          name="nomeFantasia"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Nome Fantasia (opcional)"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">CNPJ *</label>
        <input
          type="text"
          [ngModel]="tenant.cnpj"
          (ngModelChange)="tenant.cnpj = $event"
          name="cnpj"
          required
          maxlength="18"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="00.000.000/0000-00"
          (input)="formatCnpj($event)"
          (keypress)="onCnpjKeypress($event)"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Limite de Aprovação Automática (R$)</label
        >
        <input
          type="text"
          [ngModel]="limiteFormatado"
          (ngModelChange)="limiteFormatado = $event"
          name="limiteAprovacaoAutomatica"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="0,00"
          (input)="onLimiteInput($event)"
          (blur)="onLimiteBlur()"
        />
      </div>

      <div *ngIf="isEditMode">
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <div class="flex items-center">
          <input
            type="checkbox"
            [(ngModel)]="tenant.ativo"
            name="ativo"
            class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded"
          />
          <label class="ml-2 text-sm text-gray-700">Ativo</label>
        </div>
      </div>

      <div class="flex justify-between pt-4 border-t border-gray-200">
        <div *ngIf="isEditMode">
          <button
            type="button"
            (click)="onDelete()"
            class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 text-sm font-medium"
          >
            Excluir
          </button>
        </div>

        <div class="flex space-x-2">
          <button
            type="button"
            (click)="onClose()"
            class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400 text-sm font-medium"
          >
            Cancelar
          </button>
          <button
            type="submit"
            class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm font-medium"
          >
            {{ isEditMode ? 'Atualizar' : 'Criar' }}
          </button>
        </div>
      </div>
    </form>
  </dialog>
</div>
